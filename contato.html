<main class="conteudo-principal">
    <h1>Mande uma mensagem</h1>

    <form class="formulario" action="">
        <ul class="formulario-lista">
            <li class="formulario-item">
                <label>Nome
                    <input class="campo-largo" type="text" required>
                </label>
            </li>

            <li class="formulario-item">
                <label>E-mail
                    <input class="campo-texto" type="email" required>
                </label>
            </li>

            <li class="formulario-item">
                <label>Telefone (99) 99999-9999
                    <input class="campo-texto" type="tel" required>
                </label>
            </li>

            <li class="formulario-item">
                <label>Assunto
                    <select class="campo-selecao" required>
                        <option value=""> -- Selecione --</option>
                        <option>Reclamação</option>
                        <option>Sugestão</option>
                    </select>
                </label>
            </li>

            <li class="formulario-item">
                <label>Mensagem
                    <textarea class="campo-mensagem" required></textarea>
                </label>
            </li>

            <li class="formulario-item">
                <fieldset>
                    <legend>Opções de Resposta</legend>
                    <label>E-Mail</label>
                    <input type="radio" name="contato" required>

                    <label>Telefone</label>
                    <input type="radio" name="contato" required>
                </fieldset>
            </li>
        </ul>

        <button class="botao botao--enviar" type="submit">Enviar</button>
    </form>

    <footer class="rodape">
    <a class="rodape-rede" href="https://www.facebook.com/ifsppirituba/?locale=pt_BR">
