<main class="conteudo-principal">
    <h1>Inscreva-se</h1>

    <form class="formulario" action="">
        <fieldset class="formulario-item">
            <label>Evento
                <select required class="campo-selecao">
                    <option value=""> -- Selecione --</option>
                    <option>Voe sem asas</option>
                    <option>Festa junina</option>
                    <option>Semana da tecnologia</option>
                </select>
            </label>
        </fieldset>

        <fieldset class="formulario-item">
            <legend>Informações de Acesso</legend>

            <label>Usuário</label>
            <input class="campo-largo" type="text" required>

            <div class="espacamento-texto">
                <label>Senha</label>
                <input class="campo-largo" type="password" required>
            </div>

            <div class="espacamento-texto">
                <label>Confirme a senha</label>
                <input class="campo-largo" type="password" required>
            </div>
        </fieldset>

        <fieldset class="formulario-item">
            <legend>Informações Pessoais</legend>

            <label>Nome Completo</label>
            <input class="campo-largo" type="text" required>

            <div class="espacamento-texto">
                <label>E-mail</label>
                <input class="campo-texto" type="email" required>
            </div>

            <div class="espacamento-texto">
                <label>Celular (99) 99999-9999</label>
                <input class="campo-texto" type="tel" required>
            </div>

            <fieldset class="espacamento-superior">
                <legend>Sexo</legend>
                <label>Masculino</label>
                <input type="radio" name="sexo" required>

                <label>Feminino</label>
                <input type="radio" name="sexo" required>
            </fieldset>

            <div class="espacamento-texto">
                <label>Data de nascimento</label>
                <input type="date" required>
            </div>

            <div class="espacamento-texto">
                <label>Cor favorita</label>
                <input type="color" required>
            </div>

            <div class="espacamento-texto">
                <label>Perfil do Github</label>
                <input class="campo-texto" type="url" required>
            </div>
        </fieldset>

        <div class="grupo-botoes espacamento-superior">
            <button class="botao" type="submit">Inscrever</button>
            <button class="botao" type="reset">Limpar</button>
        </div>
    </form>
